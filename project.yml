name: PuzzleHouse
options:
  bundleIdPrefix: com.jestats.PuzzleHouse
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  PuzzleHouseKit:
    path: PuzzleHouseKit

targets:
  PuzzleHouse:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PuzzleHouse
    dependencies:
      - package: PuzzleHouseKit
        product: PuzzleHouseApp
      - package: PuzzleHouseKit
        product: PuzzleCloudKit
      - target: PuzzleHouseShareExtension
        embed: true
        copyPhase:
          name: Embed App Extensions
      - target: PuzzleHouseMessages
        embed: true
        copyPhase:
          name: Embed App Extensions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jestats.PuzzleHouse
        PRODUCT_NAME: Puzzle House
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_ENTITLEMENTS: PuzzleHouse/PuzzleHouse.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_CFBundleDisplayName: Puzzle House
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"

  PuzzleHouseShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PuzzleHouseShareExtension
    dependencies:
      - package: PuzzleHouseKit
        product: PuzzleParsers
      - package: PuzzleHouseKit
        product: PuzzleCloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jestats.PuzzleHouse.ShareExtension
        PRODUCT_NAME: PuzzleHouseShareExtension
        INFOPLIST_FILE: PuzzleHouseShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: PuzzleHouseShareExtension/PuzzleHouseShareExtension.entitlements
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"

  PuzzleHouseMessages:
    type: app-extension.messages
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PuzzleHouseMessages
    dependencies:
      - package: PuzzleHouseKit
        product: PuzzleHouseApp
      - package: PuzzleHouseKit
        product: PuzzleCloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jestats.PuzzleHouse.Messages
        PRODUCT_NAME: PuzzleHouseMessages
        INFOPLIST_FILE: PuzzleHouseMessages/Info.plist
        CODE_SIGN_ENTITLEMENTS: PuzzleHouseMessages/PuzzleHouseMessages.entitlements
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"

schemes:
  PuzzleHouse:
    build:
      targets:
        PuzzleHouse: all
        PuzzleHouseShareExtension: all
        PuzzleHouseMessages: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
