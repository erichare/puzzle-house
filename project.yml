name: PuzzleHouse
options:
  bundleIdPrefix: com.jestats.PuzzleHouse
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Per-target provisioning-profile variables. Default to empty so local
    # debug builds use Automatic signing; the release CI flow overrides
    # them via xcodebuild build settings to force Manual + App Store
    # profiles. See Scripts/build-ios.sh + Scripts/asc_ensure_profile.py.
    PUZZLE_HOUSE_APP_PROFILE_NAME: ""
    PUZZLE_HOUSE_APP_PROFILE_UUID: ""
    PUZZLE_HOUSE_SHARE_EXTENSION_PROFILE_NAME: ""
    PUZZLE_HOUSE_SHARE_EXTENSION_PROFILE_UUID: ""
    PUZZLE_HOUSE_MESSAGES_PROFILE_NAME: ""
    PUZZLE_HOUSE_MESSAGES_PROFILE_UUID: ""
    PUZZLE_HOUSE_WIDGET_PROFILE_NAME: ""
    PUZZLE_HOUSE_WIDGET_PROFILE_UUID: ""
    PUZZLE_HOUSE_MAC_APP_PROFILE_NAME: ""
    PUZZLE_HOUSE_MAC_APP_PROFILE_UUID: ""
    PUZZLE_HOUSE_MAC_SHARE_EXTENSION_PROFILE_NAME: ""
    PUZZLE_HOUSE_MAC_SHARE_EXTENSION_PROFILE_UUID: ""
    PUZZLE_HOUSE_MAC_WIDGET_PROFILE_NAME: ""
    PUZZLE_HOUSE_MAC_WIDGET_PROFILE_UUID: ""

packages:
  PuzzleHouseKit:
    path: PuzzleHouseKit

targets:
  PuzzleHouse:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: PuzzleHouse
    dependencies:
      - package: PuzzleHouseKit
        product: PuzzleHouseApp
      - package: PuzzleHouseKit
        product: PuzzleCloudKit
      - target: PuzzleHouseShareExtension
        embed: true
        copyPhase:
          name: Embed App Extensions
      - target: PuzzleHouseMessages
        embed: true
        copyPhase:
          name: Embed App Extensions
      - target: PuzzleHouseWidget
        embed: true
        copyPhase:
          name: Embed App Extensions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jestats.PuzzleHouse
        PRODUCT_NAME: Puzzle House
        PROVISIONING_PROFILE_SPECIFIER: "$(PUZZLE_HOUSE_APP_PROFILE_NAME)"
        PROVISIONING_PROFILE: "$(PUZZLE_HOUSE_APP_PROFILE_UUID)"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_ENTITLEMENTS: PuzzleHouse/PuzzleHouse.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # Required for the app to accept CloudKit share invites — without it,
        # tapping an invite link never calls userDidAcceptCloudKitShareWith.
        # Lives here (not just PuzzleHouse/Info.plist) so it survives xcodegen
        # regeneration in CI, which synthesises the main app's Info.plist from
        # these INFOPLIST_KEY_* settings.
        INFOPLIST_KEY_CKSharingSupported: YES
        INFOPLIST_KEY_CFBundleDisplayName: Puzzle House
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Puzzle House scans recent screenshots in your Photos to find puzzle results so you don't have to copy and paste."
        INFOPLIST_KEY_UIBackgroundModes: "remote-notification"
        # App Store validator (error 90474) requires the unsuffixed
        # UISupportedInterfaceOrientations key. The space-separated
        # string is split into an array by Xcode's plist generator.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"

  PuzzleHouseShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: PuzzleHouseShareExtension
    dependencies:
      - package: PuzzleHouseKit
        product: PuzzleShareKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jestats.PuzzleHouse.ShareExtension
        PRODUCT_NAME: PuzzleHouseShareExtension
        PROVISIONING_PROFILE_SPECIFIER: "$(PUZZLE_HOUSE_SHARE_EXTENSION_PROFILE_NAME)"
        PROVISIONING_PROFILE: "$(PUZZLE_HOUSE_SHARE_EXTENSION_PROFILE_UUID)"
        INFOPLIST_FILE: PuzzleHouseShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: PuzzleHouseShareExtension/PuzzleHouseShareExtension.entitlements
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"

  PuzzleHouseMessages:
    type: app-extension.messages
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: PuzzleHouseMessages
    dependencies:
      - package: PuzzleHouseKit
        product: PuzzleHouseApp
      - package: PuzzleHouseKit
        product: PuzzleCloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jestats.PuzzleHouse.Messages
        PRODUCT_NAME: PuzzleHouseMessages
        PROVISIONING_PROFILE_SPECIFIER: "$(PUZZLE_HOUSE_MESSAGES_PROFILE_NAME)"
        PROVISIONING_PROFILE: "$(PUZZLE_HOUSE_MESSAGES_PROFILE_UUID)"
        INFOPLIST_FILE: PuzzleHouseMessages/Info.plist
        CODE_SIGN_ENTITLEMENTS: PuzzleHouseMessages/PuzzleHouseMessages.entitlements
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"

  PuzzleHouseWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: PuzzleHouseWidget
    dependencies:
      - package: PuzzleHouseKit
        product: PuzzleCloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jestats.PuzzleHouse.Widget
        PRODUCT_NAME: PuzzleHouseWidget
        PROVISIONING_PROFILE_SPECIFIER: "$(PUZZLE_HOUSE_WIDGET_PROFILE_NAME)"
        PROVISIONING_PROFILE: "$(PUZZLE_HOUSE_WIDGET_PROFILE_UUID)"
        INFOPLIST_FILE: PuzzleHouseWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: PuzzleHouseWidget/PuzzleHouseWidget.entitlements
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"

  # Native macOS app. Shares PuzzleHouseKit (models, CloudKit, store, views)
  # with the iOS target — same CloudKit container / app group / bundle family
  # so it ships as a universal App Store app. macOS-specific UI + lifecycle
  # live in PuzzleHouseMac/. (Mac Share extension + Widget targets are added
  # in a later phase and embedded here then.)
  PuzzleHouseMac:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: PuzzleHouseMac
    dependencies:
      - package: PuzzleHouseKit
        product: PuzzleHouseApp
      - package: PuzzleHouseKit
        product: PuzzleCloudKit
      - target: PuzzleHouseMacWidget
        embed: true
        copyPhase:
          name: Embed App Extensions
      - target: PuzzleHouseMacShareExtension
        embed: true
        copyPhase:
          name: Embed App Extensions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jestats.PuzzleHouse
        PRODUCT_NAME: Puzzle House
        PROVISIONING_PROFILE_SPECIFIER: "$(PUZZLE_HOUSE_MAC_APP_PROFILE_NAME)"
        PROVISIONING_PROFILE: "$(PUZZLE_HOUSE_MAC_APP_PROFILE_UUID)"
        CODE_SIGN_ENTITLEMENTS: PuzzleHouseMac/PuzzleHouseMac.entitlements
        GENERATE_INFOPLIST_FILE: YES
        # macOS gate for the userDidAcceptCloudKitShareWith delegate callback —
        # without it the OS never delivers accepted invites to the app.
        INFOPLIST_KEY_CKSharingSupported: YES
        INFOPLIST_KEY_CFBundleDisplayName: Puzzle House
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.games"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Puzzle House scans recent screenshots to find puzzle results so you don't have to copy and paste."
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"

  # Native macOS WidgetKit widget. Reuses the exact iOS widget source
  # (PuzzleHouseWidget/PuzzleHouseWidget.swift) — it is fully cross-platform and
  # reads the shared app-group snapshot, so no code changes are needed. Renders
  # in Notification Center / on the desktop on macOS 26.
  PuzzleHouseMacWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: PuzzleHouseWidget/PuzzleHouseWidget.swift
    dependencies:
      - package: PuzzleHouseKit
        product: PuzzleCloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jestats.PuzzleHouse.MacWidget
        PRODUCT_NAME: PuzzleHouseMacWidget
        SDKROOT: macosx
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        PROVISIONING_PROFILE_SPECIFIER: "$(PUZZLE_HOUSE_MAC_WIDGET_PROFILE_NAME)"
        PROVISIONING_PROFILE: "$(PUZZLE_HOUSE_MAC_WIDGET_PROFILE_UUID)"
        INFOPLIST_FILE: PuzzleHouseMacWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: PuzzleHouseMacWidget/PuzzleHouseMacWidget.entitlements
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"

  # Native macOS Share extension (Finder/Safari share menu). Reuses the shared
  # ShareImportCore + ShareStatusView from PuzzleShareKit via an NSViewController
  # shell, so it behaves identically to the iOS Share extension.
  PuzzleHouseMacShareExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: PuzzleHouseMacShareExtension
    dependencies:
      - package: PuzzleHouseKit
        product: PuzzleShareKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jestats.PuzzleHouse.MacShareExtension
        PRODUCT_NAME: PuzzleHouseMacShareExtension
        SDKROOT: macosx
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        PROVISIONING_PROFILE_SPECIFIER: "$(PUZZLE_HOUSE_MAC_SHARE_EXTENSION_PROFILE_NAME)"
        PROVISIONING_PROFILE: "$(PUZZLE_HOUSE_MAC_SHARE_EXTENSION_PROFILE_UUID)"
        INFOPLIST_FILE: PuzzleHouseMacShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: PuzzleHouseMacShareExtension/PuzzleHouseMacShareExtension.entitlements
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"

schemes:
  PuzzleHouse:
    build:
      targets:
        PuzzleHouse: all
        PuzzleHouseShareExtension: all
        PuzzleHouseMessages: all
        PuzzleHouseWidget: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  # Separate scheme so the iOS build scripts (Scripts/build-ios.sh, which uses
  # -scheme PuzzleHouse -sdk iphoneos) keep working untouched. A future
  # build-mac.sh targets -scheme PuzzleHouseMac -sdk macosx.
  PuzzleHouseMac:
    build:
      targets:
        PuzzleHouseMac: all
        PuzzleHouseMacWidget: all
        PuzzleHouseMacShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
